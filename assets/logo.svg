<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <!-- Background card fill -->
    <radialGradient id="cardBg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a1060"/>
      <stop offset="100%" stop-color="#0d0830"/>
    </radialGradient>

    <!-- Neon glow filter for "Kr" letters -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Softer glow for border tubes -->
    <filter id="tubeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for "36" and "Krypton Labs" text -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer rounded rectangle (neon tube border) -->
  <rect x="18" y="18" width="364" height="304" rx="28" ry="28"
        fill="url(#cardBg)" stroke="#5533cc" stroke-width="3" opacity="0.9"/>

  <!-- Neon border glow tubes -->
  <!-- Top tube -->
  <rect x="42" y="14" width="316" height="8" rx="4" fill="#7744ff" filter="url(#tubeGlow)" opacity="0.9"/>
  <!-- Bottom tube -->
  <rect x="42" y="318" width="316" height="8" rx="4" fill="#7744ff" filter="url(#tubeGlow)" opacity="0.9"/>
  <!-- Left tube -->
  <rect x="14" y="42" width="8" height="256" rx="4" fill="#7744ff" filter="url(#tubeGlow)" opacity="0.9"/>
  <!-- Right tube -->
  <rect x="378" y="42" width="8" height="256" rx="4" fill="#7744ff" filter="url(#tubeGlow)" opacity="0.9"/>

  <!-- Corner connectors -->
  <circle cx="42" cy="42" r="7" fill="#9966ff" filter="url(#tubeGlow)" opacity="0.9"/>
  <circle cx="358" cy="42" r="7" fill="#9966ff" filter="url(#tubeGlow)" opacity="0.9"/>
  <circle cx="42" cy="298" r="7" fill="#9966ff" filter="url(#tubeGlow)" opacity="0.9"/>
  <circle cx="358" cy="298" r="7" fill="#9966ff" filter="url(#tubeGlow)" opacity="0.9"/>

  <!-- Horizontal divider line above "Krypton Labs" -->
  <rect x="36" y="243" width="328" height="3" rx="1.5" fill="#6644bb" opacity="0.7"/>

  <!-- Atomic number "36" top-left -->
  <text x="52" y="64" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" font-weight="600" fill="#c8b0ff" filter="url(#textGlow)"
        letter-spacing="1">36</text>

  <!-- "Kr" neon letters -->
  <!-- K -->
  <text x="68" y="218" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="164" font-weight="800" fill="none"
        stroke="#a080ff" stroke-width="6"
        filter="url(#neonGlow)" opacity="0.35">K</text>
  <text x="68" y="218" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="164" font-weight="800" fill="none"
        stroke="#ddd0ff" stroke-width="2"
        filter="url(#neonGlow)">K</text>

  <!-- r -->
  <text x="210" y="218" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="164" font-weight="800" fill="none"
        stroke="#a080ff" stroke-width="6"
        filter="url(#neonGlow)" opacity="0.35">r</text>
  <text x="210" y="218" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="164" font-weight="800" fill="none"
        stroke="#ddd0ff" stroke-width="2"
        filter="url(#neonGlow)">r</text>

  <!-- "Krypton Labs™" label -->
  <text x="200" y="284" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="30" font-weight="500" fill="#e0d0ff"
        text-anchor="middle" filter="url(#textGlow)"
        letter-spacing="1">Krypton Labs&#x2122;</text>
</svg>
